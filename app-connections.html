<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex"><title>App Connections | A New You CDC</title><link rel="canonical" href="https://anewyoucdc.com/app-connections.html"><link rel="stylesheet" href="site-pages.css"><style>form{display:grid;gap:15px;padding:32px;border-radius:24px;background:#fff;box-shadow:var(--shadow)}label{display:block;font-weight:900}input{width:100%;padding:12px;border:1px solid #ddd;border-radius:10px}</style></head><body><main><section class="hero"><div class="container"><p class="eyebrow">Website settings</p><h1>Connect your business apps.</h1><p class="lead">Paste your official scheduling, donation, secure-upload, calendar, and social-media links.</p></div></section><section class="section white"><div class="container"><form id="config"><div class="notice">These settings save in this browser for previewing. They will be made permanent when the site is hosted.</div><label>Scheduling app<input name="booking" type="url"></label><label>Public calendar<input name="calendar" type="url"></label><label>Donation app<input name="donate" type="url"></label><label>Secure upload portal<input name="upload" type="url"></label><label>Facebook<input name="facebook" type="url"></label><label>Instagram<input name="instagram" type="url"></label><label>LinkedIn<input name="linkedin" type="url"></label><button class="button primary">Save app connections</button><p id="saved"></p></form></div></section></main><script>const key='anyou_app_links',f=config,o=JSON.parse(localStorage.getItem(key)||'{}');Object.entries(o).forEach(([k,v])=>{if(f.elements[k])f.elements[k].value=v});f.onsubmit=e=>{e.preventDefault();let x={};new FormData(f).forEach((v,k)=>x[k]=v.trim());localStorage.setItem(key,JSON.stringify(x));saved.textContent='App links saved in this browser.'};</script></body></html>
